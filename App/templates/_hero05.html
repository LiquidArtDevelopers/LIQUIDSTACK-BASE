<header
  class="hero05 {classVar}"
  data-hero05
  data-hero05-text="{hero05-text}"
  data-hero05-distortion="{hero05-distortion}"
  data-hero05-chroma="{hero05-chroma}"
  data-hero05-damping="{hero05-damping}"
  data-hero05-radius="{hero05-radius}"
  data-hero05-force="{hero05-force}"
  data-hero05-sim="{hero05-sim}">
  <canvas class="hero05-canvas" data-hero05-canvas aria-hidden="true"></canvas>
  <div class="hero05-content">
    {hero05-content}
  </div>
  <h1 class="hero05-sr">{hero05-text}</h1>
</header>
